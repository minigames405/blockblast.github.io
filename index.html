<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Neon Pro Max</title>
    <style>
        :root { 
            --bg: #020617; --grid: #1e293b; --cell: #334155;
            --blue: #22d3ee; --purple: #a855f7; --rose: #fb7185; --amber: #fbbf24;
            --rainbow: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
        }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
        }

        #ui { text-align: center; margin-bottom: 10px; position: relative; }
        #score { font-size: 4rem; font-weight: 900; text-shadow: 0 0 20px var(--blue); margin: 0; transition: all 0.3s; }
        
        #grid {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            gap: 4px; background: var(--grid); padding: 10px; border-radius: 16px;
            width: 88vw; height: 88vw; max-width: 400px; max-height: 400px;
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .cell { background: var(--cell); border-radius: 6px; transition: all 0.15s; }
        .cell.highlight { background: rgba(255,255,255,0.3) !important; box-shadow: inset 0 0 15px white; }
        .filled { border: 1px solid rgba(255,255,255,0.1); }
        
        /* Block Farben */
        .c-0 { background: linear-gradient(135deg, var(--blue), #0891b2); box-shadow: 0 0 10px var(--blue); }
        .c-1 { background: linear-gradient(135deg, var(--purple), #7e22ce); box-shadow: 0 0 10px var(--purple); }
        .c-2 { background: linear-gradient(135deg, var(--rose), #be123c); box-shadow: 0 0 10px var(--rose); }
        .c-3 { background: linear-gradient(135deg, var(--amber), #b45309); box-shadow: 0 0 10px var(--amber); }
        .c-rainbow { background: var(--rainbow); box-shadow: 0 0 15px white; animation: rainbow-glow 2s linear infinite; }

        @keyframes rainbow-glow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        #tray { display: flex; gap: 10px; align-items: center; justify-content: center; min-height: 140px; margin-top: 15px; }
        .piece-container { width: 95px; height: 95px; display: flex; justify-content: center; align-items: center; position: relative; }
        .piece { display: grid; gap: 2px; position: absolute; pointer-events: none; z-index: 1000; will-change: transform, left, top; }
        .p-cell { width: 22px; height: 22px; border-radius: 4px; }

        /* Urheberrecht */
        #credits {
            position: fixed; bottom: 10px; left: 15px; font-size: 0.8rem;
            color: rgba(255,255,255,0.4); pointer-events: none; letter-spacing: 1px;
        }

        .floating-point {
            position: fixed; color: white; font-weight: bold; font-size: 1.5rem;
            pointer-events: none; z-index: 3000; text-shadow: 0 0 10px var(--blue);
            animation: flyToScore 0.8s ease-in forwards;
        }

        @keyframes flyToScore {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { top: 50px !important; left: 50% !important; transform: translate(-50%, 0) scale(0.5); opacity: 0; }
        }

        .blast { animation: blast 0.5s ease-out forwards; }
        @keyframes blast { 0% { transform: scale(1); filter: brightness(4); } 100% { transform: scale(1.5); opacity: 0; } }
        
        #overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
    </div>
    
    <div id="grid"></div>
    <div id="tray"></div>

    <div id="credits">MADE BY Sakul1212</div>

    <div id="overlay">
        <h1 style="color:var(--rose); font-size: 3rem;">GAME OVER</h1>
        <button onclick="init()" style="padding:15px 40px; border-radius:30px; border:none; font-weight:bold; cursor:pointer;">NEUSTART</button>
    </div>

    <script>
        const gridEl = document.getElementById('grid'), trayEl = document.getElementById('tray'), scoreEl = document.getElementById('score');
        let score = 0, grid = [], lastX = 0, lastY = 0;
        let isDragging = false;

        const shapes = [
            {d: [[1,1],[1,1]], c: 'c-0'}, 
            {d: [[1,1,1]], c: 'c-1'}, 
            {d: [[1],[1],[1]], c: 'c-1'}, 
            {d: [[1,0],[1,0],[1,1]], c: 'c-2'}, 
            {d: [[1,1,1],[0,1,0]], c: 'c-3'}
        ];

        function init() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0; scoreEl.innerText = "0";
            document.getElementById('overlay').style.display = "none";
            gridEl.innerHTML = '';
            for (let i = 0; i < 64; i++) gridEl.appendChild(document.createElement('div')).className = 'cell';
            spawn();
        }

        function spawn() {
            trayEl.innerHTML = '';
            for (let i = 0; i < 3; i++) createPiece();
            setTimeout(checkGameOver, 300);
        }

        function createPiece() {
            const cont = document.createElement('div');
            cont.className = 'piece-container';
            // 10% Chance auf Regenbogen-Block
            const isRainbow = Math.random() < 0.1;
            const sObj = isRainbow ? {d: [[1]], c: 'c-rainbow', isSpecial: true} : shapes[Math.floor(Math.random() * shapes.length)];
            
            const p = document.createElement('div');
            p.className = 'piece'; p._data = sObj;
            p.style.gridTemplateColumns = `repeat(${sObj.d[0].length}, 22px)`;
            
            sObj.d.forEach(row => row.forEach(v => {
                const c = document.createElement('div');
                c.className = v ? `p-cell ${sObj.c}` : '';
                if(!v) c.style.opacity = 0;
                p.appendChild(c);
            }));
            
            addDrag(cont, p, sObj);
            cont.appendChild(p); trayEl.appendChild(cont);
        }

        function addDrag(cont, el, sObj) {
            let sX, sY, offY = 130; 
            
            cont.addEventListener('touchstart', e => {
                const t = e.touches[0];
                const rect = el.getBoundingClientRect();
                sX = t.clientX - rect.left; sY = t.clientY - rect.top;
                lastX = t.clientX; lastY = t.clientY;
                isDragging = true;
                el.style.position = 'fixed'; el.style.zIndex = "2000";
            }, {passive: false});

            cont.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                lastX = t.clientX; lastY = t.clientY;
                el.style.left = (t.clientX - sX) + 'px';
                el.style.top = (t.clientY - sY - offY) + 'px';
                el.style.transform = 'scale(1.8)';
                
                clearHighlights();
                const target = document.elementFromPoint(lastX, lastY - offY);
                if (target && target.classList.contains('cell')) {
                    const idx = Array.from(gridEl.children).indexOf(target);
                    showHighlight(sObj.d, Math.floor(idx / 8), idx % 8);
                }
            }, {passive: false});

            cont.addEventListener('touchend', () => {
                isDragging = false;
                clearHighlights();
                el.style.display = 'none';
                const target = document.elementFromPoint(lastX, lastY - offY);
                el.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const idx = Array.from(gridEl.children).indexOf(target);
                    const r = Math.floor(idx / 8), c = idx % 8;
                    if (canPlace(sObj.d, r, c)) {
                        place(sObj, r, c);
                        if(sObj.isSpecial) triggerRainbow(r, c);
                        cont.remove();
                        checkLines();
                        if (trayEl.children.length === 0) spawn();
                        else setTimeout(checkGameOver, 50);
                        return;
                    }
                }
                el.style.position = 'absolute'; el.style.left = 'auto'; el.style.top = 'auto'; el.style.transform = 'scale(1)';
            });
        }

        function showHighlight(s, r, c) {
            if (!canPlace(s, r, c)) return;
            s.forEach((row, i) => row.forEach((v, j) => {
                if(v) gridEl.children[(r+i)*8+(c+j)].classList.add('highlight');
            }));
        }

        function clearHighlights() {
            Array.from(gridEl.children).forEach(c => c.classList.remove('highlight'));
        }

        function canPlace(s, r, c) {
            return s.every((row, i) => row.every((v, j) => 
                !v || (r+i < 8 && c+j < 8 && !grid[r+i][c+j])
            ));
        }

        function place(obj, r, c) {
            obj.d.forEach((row, i) => row.forEach((v, j) => {
                if(v) { 
                    grid[r+i][c+j] = obj.c; 
                    gridEl.children[(r+i)*8+(c+j)].className = `cell filled ${obj.c}`;
                }
            }));
        }

        function triggerRainbow(r, c) {
            for(let i=-1; i<=1; i++) {
                for(let j=-1; j<=1; j++) {
                    let nr = r+i, nc = c+j;
                    if(nr>=0 && nr<8 && nc>=0 && nc<8) {
                        grid[nr][nc] = null;
                        let cell = gridEl.children[nr*8+nc];
                        cell.classList.add('blast');
                        setTimeout(() => cell.className = 'cell', 500);
                    }
                }
            }
        }

        function checkLines() {
            let rCl = [], cCl = [];
            for(let i=0; i<8; i++) {
                if(grid[i].every(v => v !== null)) rCl.push(i);
                let colFull = true;
                for(let j=0; j<8; j++) if(grid[j][i] === null) colFull = false;
                if(colFull) cCl.push(i);
            }
            let toDel = new Set();
            rCl.forEach(r => { for(let c=0; c<8; c++) toDel.add(`${r},${c}`); });
            cCl.forEach(c => { for(let r=0; r<8; r++) toDel.add(`${r},${c}`); });

            if(toDel.size > 0) {
                toDel.forEach(coord => {
                    const [r, c] = coord.split(',').map(Number);
                    grid[r][c] = null;
                    const cell = gridEl.children[r*8+c];
                    createPointAnim(cell.getBoundingClientRect());
                    cell.classList.add('blast');
                    setTimeout(() => cell.className = 'cell', 500);
                });
                setTimeout(() => {
                    score += toDel.size * 10;
                    scoreEl.innerText = score;
                }, 800);
            }
        }

        function createPointAnim(rect) {
            const p = document.createElement('div');
            p.className = 'floating-point'; p.innerText = '+10';
            p.style.left = rect.left + 'px'; p.style.top = rect.top + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function checkGameOver() {
            const pieces = Array.from(trayEl.querySelectorAll('.piece'));
            if(!pieces.length) return;
            const ok = pieces.some(p => {
                const s = p._data.d;
                for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(canPlace(s, r, c)) return true;
                return false;
            });
            if(!ok) document.getElementById('overlay').style.display = "flex";
        }

        init();
    </script>
</body>
</html>
