<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Neon Pro</title>
    <style>
        :root { 
            --bg: #020617; --grid: #1e293b; --cell: #334155;
            --blue: #22d3ee; --purple: #a855f7; --rose: #fb7185; --amber: #fbbf24;
        }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            height: 100%; width: 100%; max-width: 500px; padding: 20px;
        }

        /* Querformat-Optimierung */
        @media (orientation: landscape) {
            #game-wrapper { flex-direction: row; max-width: 95%; }
            #grid { width: 65vh; height: 65vh; }
            #tray { flex-direction: column; width: 140px; height: 80%; }
        }

        #ui { text-align: center; }
        #score { font-size: 4rem; font-weight: 900; text-shadow: 0 0 20px var(--blue); margin: 0; }
        #best { font-size: 1rem; color: var(--blue); opacity: 0.8; letter-spacing: 2px; }
        
        #grid {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            gap: 4px; background: var(--grid); padding: 10px; border-radius: 16px;
            width: 88vw; height: 88vw; max-width: 420px; max-height: 420px;
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .cell { background: var(--cell); border-radius: 6px; transition: background 0.3s; }
        .filled { border: 1px solid rgba(255,255,255,0.1); }
        
        /* Block-Farben */
        .c-0 { background: linear-gradient(135deg, var(--blue), #0891b2); box-shadow: 0 0 15px var(--blue); }
        .c-1 { background: linear-gradient(135deg, var(--purple), #7e22ce); box-shadow: 0 0 15px var(--purple); }
        .c-2 { background: linear-gradient(135deg, var(--rose), #be123c); box-shadow: 0 0 15px var(--rose); }
        .c-3 { background: linear-gradient(135deg, var(--amber), #b45309); box-shadow: 0 0 15px var(--amber); }

        #tray { display: flex; gap: 15px; align-items: center; justify-content: center; min-height: 140px; }
        .piece-container { width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; position: relative; }
        .piece { display: grid; gap: 2px; position: absolute; pointer-events: none; z-index: 10; }
        .p-cell { width: 22px; height: 22px; border-radius: 4px; }

        /* Animationen */
        .blast { animation: blast 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards; }
        @keyframes blast { 0% { transform: scale(1.1); filter: brightness(4); } 100% { transform: scale(0); opacity: 0; } }

        #overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px);
        }
        .btn {
            padding: 18px 40px; border-radius: 40px; border: none; background: white; 
            color: black; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ui">
            <div id="score">0</div>
            <div id="best">BEST: 0</div>
        </div>
        <div id="grid"></div>
        <div id="tray"></div>
    </div>

    <div id="overlay">
        <h1 style="color:var(--rose); font-size: 3.5rem; margin: 0;">GAME OVER</h1>
        <p id="final-score" style="font-size: 1.5rem; margin: 20px 0 40px 0;">Punkte: 0</p>
        <button class="btn" onclick="init()">NEUSTART</button>
    </div>

    <script>
        const gridEl = document.getElementById('grid'), trayEl = document.getElementById('tray'), scoreEl = document.getElementById('score');
        let score = 0, grid = [], lastX = 0, lastY = 0;

        const shapes = [
            {d: [[1,1],[1,1]], c: 'c-0'}, 
            {d: [[1,1,1]], c: 'c-1'}, 
            {d: [[1],[1],[1]], c: 'c-1'}, 
            {d: [[1,0],[1,0],[1,1]], c: 'c-2'}, 
            {d: [[1,1,1],[0,1,0]], c: 'c-3'}
        ];

        function init() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0; scoreEl.innerText = "0";
            document.getElementById('best').innerText = "BEST: " + (localStorage.getItem('bb_best') || 0);
            document.getElementById('overlay').style.display = "none";
            gridEl.innerHTML = '';
            for (let i = 0; i < 64; i++) gridEl.appendChild(document.createElement('div')).className = 'cell';
            spawn();
        }

        function spawn() {
            trayEl.innerHTML = '';
            for (let i = 0; i < 3; i++) createPiece();
            setTimeout(checkGameOver, 300);
        }

        function createPiece() {
            const cont = document.createElement('div');
            cont.className = 'piece-container';
            const sObj = shapes[Math.floor(Math.random() * shapes.length)];
            const p = document.createElement('div');
            p.className = 'piece'; p._data = sObj;
            p.style.gridTemplateColumns = `repeat(${sObj.d[0].length}, 22px)`;
            
            sObj.d.forEach(row => row.forEach(v => {
                const c = document.createElement('div');
                c.className = v ? `p-cell ${sObj.c}` : '';
                if(!v) c.style.opacity = 0;
                p.appendChild(c);
            }));
            
            addDrag(cont, p, sObj);
            cont.appendChild(p); trayEl.appendChild(cont);
        }

        function addDrag(cont, el, sObj) {
            let sX, sY, off = 120; 
            cont.addEventListener('touchstart', e => {
                const t = e.touches[0];
                const r = el.getBoundingClientRect();
                sX = t.clientX - r.left; sY = t.clientY - r.top;
                lastX = t.clientX; lastY = t.clientY;
                el.style.position = 'fixed'; 
                el.style.zIndex = "1000";
            }, {passive: false});

            cont.addEventListener('touchmove', e => {
                const t = e.touches[0];
                lastX = t.clientX; lastY = t.clientY;
                el.style.left = (t.clientX - sX) + 'px';
                el.style.top = (t.clientY - sY - off) + 'px';
                el.style.transform = 'scale(1.8)';
            }, {passive: false});

            cont.addEventListener('touchend', () => {
                el.style.display = 'none';
                const target = document.elementFromPoint(lastX, lastY - off);
                el.style.display = 'grid';

                if (target && target.classList.contains('cell')) {
                    const idx = Array.from(gridEl.children).indexOf(target);
                    const r = Math.floor(idx / 8), c = idx % 8;
                    if (canPlace(sObj.d, r, c)) {
                        place(sObj, r, c);
                        cont.remove();
                        checkLines();
                        if (trayEl.children.length === 0) spawn();
                        else setTimeout(checkGameOver, 50);
                        return;
                    }
                }
                el.style.position = 'absolute'; el.style.left = 'auto'; el.style.top = 'auto'; el.style.transform = 'scale(1)';
            });
        }

        function canPlace(s, r, c) {
            return s.every((row, i) => row.every((v, j) => 
                !v || (r+i < 8 && c+j < 8 && !grid[r+i][c+j])
            ));
        }

        function place(obj, r, c) {
            obj.d.forEach((row, i) => row.forEach((v, j) => {
                if(v) { 
                    grid[r+i][c+j] = obj.c; 
                    gridEl.children[(r+i)*8+(c+j)].className = `cell filled ${obj.c}`;
                }
            }));
        }

        function checkLines() {
            let rCl = [], cCl = [];
            for(let i=0; i<8; i++) {
                if(grid[i].every(v => v !== null)) rCl.push(i);
                if(grid.every(row => row[i] !== null)) cCl.push(i);
            }
            let toDel = new Set();
            rCl.forEach(r => { for(let c=0; c<8; c++) toDel.add(`${r},${c}`); });
            cCl.forEach(c => { for(let r=0; r<8; r++) toDel.add(`${r},${c}`); });

            toDel.forEach(coord => {
                const [r, c] = coord.split(',').map(Number);
                grid[r][c] = null;
                const cell = gridEl.children[r*8+c];
                cell.classList.add('blast');
                setTimeout(() => cell.className = 'cell', 500);
            });
            if(toDel.size > 0) {
                score += toDel.size * 10; scoreEl.innerText = score;
                saveHighscore();
            }
        }

        function checkGameOver() {
            const pieces = Array.from(trayEl.querySelectorAll('.piece'));
            if(!pieces.length) return;
            const ok = pieces.some(p => {
                const s = p._data.d;
                for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(canPlace(s, r, c)) return true;
                return false;
            });
            if(!ok) {
                document.getElementById('final-score').innerText = "Score: " + score;
                document.getElementById('overlay').style.display = "flex";
            }
        }

        function saveHighscore() {
            let current = localStorage.getItem('bb_best') || 0;
            if(score > current) localStorage.setItem('bb_best', score);
        }

        init();
    </script>
</body>
</html>
