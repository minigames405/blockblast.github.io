<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Neon Pro Max</title>
    <style>
        :root { 
            --bg: #020617; --grid: #1e293b; --cell: #334155;
            --blue: #22d3ee; --purple: #a855f7; --rose: #fb7185; --amber: #fbbf24;
            --rainbow: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
        }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; touch-action: none;
        }

        #ui { text-align: center; margin-bottom: 5px; position: relative; }
        #score { font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 20px var(--blue); margin: 0; }
        #best-container { font-size: 1rem; color: rgba(255,255,255,0.6); margin-top: -5px; font-weight: bold; }
        
        #grid {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            gap: 4px; background: var(--grid); padding: 10px; border-radius: 16px;
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .cell { background: var(--cell); border-radius: 6px; transition: background 0.1s; }
        /* Das weiße Highlight beim Drüberziehen */
        .cell.highlight { background: rgba(255,255,255,0.6) !important; box-shadow: 0 0 15px white; }
        
        .c-0 { background: linear-gradient(135deg, var(--blue), #0891b2); box-shadow: 0 0 10px var(--blue); }
        .c-1 { background: linear-gradient(135deg, var(--purple), #7e22ce); box-shadow: 0 0 10px var(--purple); }
        .c-2 { background: linear-gradient(135deg, var(--rose), #be123c); box-shadow: 0 0 10px var(--rose); }
        .c-3 { background: linear-gradient(135deg, var(--amber), #b45309); box-shadow: 0 0 10px var(--amber); }

        #tray { display: flex; gap: 15px; align-items: center; justify-content: center; min-height: 120px; margin-top: 20px; }
        .piece-container { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; }
        .piece { display: grid; gap: 2px; transition: transform 0.1s; pointer-events: none; }
        .p-cell { width: 20px; height: 20px; border-radius: 4px; }

        #credits { position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
        #overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div id="best-container">BEST: <span id="bestScore">0</span></div>
    </div>
    
    <div id="grid"></div>
    <div id="tray"></div>

    <div id="credits">BY Sakul1212</div>

    <div id="overlay">
        <h1 style="color:var(--rose); font-size: 3rem; margin: 0;">GAME OVER</h1>
        <p id="finalScore" style="font-size: 1.5rem; margin: 10px 0 30px;">Score: 0</p>
        <button onclick="init()" style="padding:15px 40px; border-radius:30px; border:none; font-weight:bold; background:var(--blue); color:var(--bg); cursor:pointer;">NEUSTART</button>
    </div>

    <script>
        const gridEl = document.getElementById('grid'), trayEl = document.getElementById('tray');
        const scoreEl = document.getElementById('score'), bestEl = document.getElementById('bestScore');
        let score = 0, bestScore = localStorage.getItem('blockBest') || 0;
        let grid = [];

        const shapes = [
            {d: [[1,1],[1,1]], c: 'c-0'}, {d: [[1,1,1]], c: 'c-1'}, 
            {d: [[1,1,1],[0,1,0]], c: 'c-3'}, {d: [[1,1],[1,0],[1,0]], c: 'c-2'}
        ];

        function init() {
            grid = Array(8).fill().map(() => Array(8).fill(null));
            score = 0; scoreEl.innerText = "0";
            bestEl.innerText = bestScore;
            document.getElementById('overlay').style.display = "none";
            gridEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                gridEl.appendChild(c);
            }
            spawn();
        }

        function spawn() {
            trayEl.innerHTML = '';
            for (let i = 0; i < 3; i++) createPiece();
        }

        function createPiece() {
            const cont = document.createElement('div');
            cont.className = 'piece-container';
            const sObj = shapes[Math.floor(Math.random() * shapes.length)];
            const p = document.createElement('div');
            p.className = 'piece';
            p.style.gridTemplateColumns = `repeat(${sObj.d[0].length}, 20px)`;
            
            sObj.d.forEach(row => row.forEach(v => {
                const c = document.createElement('div');
                c.className = v ? `p-cell ${sObj.c}` : '';
                if(!v) c.style.opacity = 0;
                p.appendChild(c);
            }));
            
            addDrag(cont, p, sObj);
            cont.appendChild(p); trayEl.appendChild(cont);
        }

        function addDrag(cont, el, sObj) {
            let sX, sY, offY = 120; // Versatz nach oben beim Ziehen
            
            cont.addEventListener('touchstart', e => {
                const t = e.touches[0];
                const rect = el.getBoundingClientRect();
                sX = t.clientX - rect.left; sY = t.clientY - rect.top;
                el.style.position = 'fixed';
                el.style.transform = 'scale(1.5)';
                updateDrag(t.clientX, t.clientY);
            });

            cont.addEventListener('touchmove', e => {
                e.preventDefault();
                const t = e.touches[0];
                updateDrag(t.clientX, t.clientY);
            });

            function updateDrag(x, y) {
                el.style.left = (x - sX) + 'px';
                el.style.top = (y - sY - offY) + 'px'; // Block schwebt über Finger
                
                clearHighlights();
                // Checke die Position unter dem SCHWEBENDEN Block (y - offY)
                const target = document.elementFromPoint(x, y - offY);
                if (target && target.classList.contains('cell')) {
                    const idx = Array.from(gridEl.children).indexOf(target);
                    showHighlight(sObj.d, Math.floor(idx / 8), idx % 8);
                }
            }

            cont.addEventListener('touchend', e => {
                const t = e.changedTouches[0];
                const target = document.elementFromPoint(t.clientX, t.clientY - offY);
                let placed = false;

                if (target && target.classList.contains('cell')) {
                    const idx = Array.from(gridEl.children).indexOf(target);
                    placed = tryPlace(sObj, Math.floor(idx / 8), idx % 8);
                }

                if (placed) {
                    cont.remove();
                    if (trayEl.children.length === 0) spawn();
                } else {
                    el.style.position = 'relative';
                    el.style.left = '0'; el.style.top = '0';
                    el.style.transform = 'scale(1)';
                }
                clearHighlights();
            });
        }

        function showHighlight(shape, r, c) {
            shape.forEach((row, dr) => row.forEach((v, dc) => {
                if (v && grid[r + dr] && grid[r + dr][c + dc] === null) {
                    const idx = (r + dr) * 8 + (c + dc);
                    gridEl.children[idx].classList.add('highlight');
                }
            }));
        }

        function clearHighlights() {
            Array.from(gridEl.children).forEach(c => c.classList.remove('highlight'));
        }

        function tryPlace(shape, r, c) {
            // Check
            for(let dr=0; dr<shape.d.length; dr++) {
                for(let dc=0; dc<shape.d[0].length; dc++) {
                    if (shape.d[dr][dc]) {
                        if (r+dr > 7 || c+dc > 7 || grid[r+dr][c+dc] !== null) return false;
                    }
                }
            }
            // Place
            shape.d.forEach((row, dr) => row.forEach((v, dc) => {
                if (v) {
                    grid[r+dr][c+dc] = shape.c;
                    const idx = (r+dr)*8 + (c+dc);
                    gridEl.children[idx].className = `cell filled ${shape.c}`;
                }
            }));
            updateScore(10);
            checkLines();
            return true;
        }

        function checkLines() {
            let fullR = [], fullC = [];
            for(let i=0; i<8; i++) {
                if (grid[i].every(v => v !== null)) fullR.push(i);
                if (grid.map(row => row[i]).every(v => v !== null)) fullC.push(i);
            }
            fullR.forEach(r => {
                grid[r] = Array(8).fill(null);
                for(let c=0; c<8; c++) animateClear(r, c);
            });
            fullC.forEach(c => {
                for(let r=0; r<8; r++) {
                    grid[r][c] = null;
                    animateClear(r, c);
                }
            });
            if(fullR.length || fullC.length) updateScore((fullR.length + fullC.length) * 100);
        }

        function animateClear(r, c) {
            const el = gridEl.children[r * 8 + c];
            el.className = 'cell';
        }

        function updateScore(pts) {
            score += pts;
            scoreEl.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                bestEl.innerText = bestScore;
                localStorage.setItem('blockBest', bestScore);
            }
        }

        init();
    </script>
</body>
</html>
